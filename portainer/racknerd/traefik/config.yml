http:
 #region routers
  routers:
    #PORTAINER
    portainer:
      entryPoints:
        - "https"
      rule: "Host(`port.argaceve.com`)"
      middlewares:
        - default-headers
        - https-redirect
      tls: {}
      service: portainer
    #VAULTWARDEN
    vault-warden:
      entryPoints:
        - "https"
      rule: "Host(`passvault.argaceve.com`)"
      middlewares:
        - default-headers
        - https-redirect
      tls: {}
      service: vault-warden
    #HEADSCALE
    headscale:
      entryPoints:
        - "https"
      rule: "Host(`headscale.argaceve.com`)"
      middlewares:
        - default-headers
        - https-redirect
      tls: {}
      service: headscale
    #UNIFI
    unifi:
      entryPoints:
        - "https"
      rule: "Host(`unifi.argaceve.com`)"
      middlewares:
        - default-headers
        - https-redirect
      tls: {}
      service: unifi
#endregion

#region services
  services:
    #PORTAINER
    portainer:
      loadBalancer:
        servers:
          - url: "https://23.95.205.205:9443"
        passHostHeader: true
    #VAULTWARDEN
    vault-warden:
      loadBalancer:
        servers:
          - url: "http://23.95.205.205:8082"
        passHostHeader: true
    #HEADSCALE
    headscale:
      loadBalancer:
        servers:
          - url: "http://23.95.205.205:8088"
        passHostHeader: true
    #UNIFI
    unifi:
      loadBalancer:
        servers:
          - url: "https://23.95.205.205:8443"
        passHostHeader: true
#endregion

  middlewares:
    https-redirect:
      redirectScheme:
        scheme: https
        permanent: true

    default-headers:
      headers:
        frameDeny: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 15552000
        customFrameOptionsValue: SAMEORIGIN
        customRequestHeaders:
          X-Forwarded-Proto: https

    default-whitelist:
      ipWhiteList:
        sourceRange:
        - "10.0.0.0/8"
        - "192.168.0.0/16"
        - "172.16.0.0/12"

    secured:
      chain:
        middlewares:
        - default-whitelist
        - default-headers