http:
 #region routers
  routers:
    #ARCHDELUGEVPN
    archdelugevpn:
      entryPoints:
        - "https"
      rule: "Host(`dltor.arkasri.com`)"
      middlewares:
        - default-headers
        - https-redirect
      tls: {}
      service: archdelugevpn
    #PORTAINER
    portainer:
      entryPoints:
        - "https"
      rule: "Host(`hport.arkasri.com`)"
      middlewares:
        - default-headers
        - https-redirect
      tls: {}
      service: portainer
    #PROXMOX
    proxmox:
      entryPoints:
        - "https"
      rule: "Host(`proxmox.arkasri.com`)"
      middlewares:
        - default-headers
        - https-redirect
      tls: {}
      service: proxmox
    #PFSENSE
    pfsense:
      entryPoints:
        - "https"
      rule: "Host(`pfsense.arkasri.com`)"
      middlewares:
        - default-headers
        - https-redirect
      tls: {}
      service: pfsense
    #OPENMEDIAVAULT
    openmediavault:
      entryPoints:
        - "https"
      rule: "Host(`omv.arkasri.com`)"
      middlewares:
        - default-headers
        - https-redirect
      tls: {}
      service: openmediavault
#endregion

#region services
  services:
    #ARCHDELUGEVPN
    archdelugevpn:
      loadBalancer:
        servers:
          - url: "http://10.10.1.11:8112"
        passHostHeader: true
     #PORTAINER
    portainer:
      loadBalancer:
        servers:
          - url: "http://10.10.1.11:9000"
        passHostHeader: true
    #PROXMOX
    proxmox:
      loadBalancer:
        servers:
          - url: "https://10.10.1.10:8006"
        passHostHeader: true
    #PFSENSE
    pfsense:
      loadBalancer:
        servers:
          - url: "https://10.10.1.20:8080"
        passHostHeader: true
    #OPENMEDIAVAULT
    openmediavault:
      loadBalancer:
        servers:
          - url: "https://10.10.1.11:8443"
        passHostHeader: true
#endregion

  middlewares:
    https-redirect:
      redirectScheme:
        scheme: https
        permanent: true

    default-headers:
      headers:
        frameDeny: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 15552000
        customFrameOptionsValue: SAMEORIGIN
        customRequestHeaders:
          X-Forwarded-Proto: https

    default-whitelist:
      ipWhiteList:
        sourceRange:
        - "10.0.0.0/8"
        - "192.168.0.0/16"
        - "172.16.0.0/12"

    secured:
      chain:
        middlewares:
        - default-whitelist
        - default-headers